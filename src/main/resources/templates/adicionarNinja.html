<!
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Adicionar Novo Ninja</title>
    <style>
        /* ==========================================================================
           CONFIGURAÇÕES GLOBAIS
           ========================================================================== */
        :root {
            --bg-color: #fceddb;
            --card-bg: #ffffff;
            --text-primary: #1a1a1a;
            --border-color: #e2e8f0;

            --naruto-orange: #ff6b00;
            --konoha-blue: #1b365d;
            --jounin-green: #2d6a4f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* ==========================================================================
           TÍTULO
           ========================================================================== */

        h1 {
            color: var(--konoha-blue);
            font-size: 2.8rem;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 1px 1px var(--naruto-orange);
        }

        h1::after {
            content: "";
            display: block;
            width: 90px;
            height: 5px;
            background: var(--naruto-orange);
            margin: 10px auto 0;
            border-radius: 5px;
        }

        /* ==========================================================================
           CARD DO FORMULÁRIO
           ========================================================================== */

        .form-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 35px;
            border-radius: 18px;
            border: 2px solid var(--konoha-blue);
            box-shadow: 0 10px 25px rgba(0,0,0,.15);
        }

        /* ==========================================================================
           MENSAGEM
           ========================================================================== */

        .mensagem {
            background: #d4edda;
            color: var(--jounin-green);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--jounin-green);
            font-weight: bold;
        }

        /* ==========================================================================
           FORMULÁRIO
           ========================================================================== */

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 18px;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--konoha-blue);
        }

        input {
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            transition: all .3s;
            outline: none;
        }

        input:focus {
            border-color: var(--naruto-orange);
            box-shadow: 0 0 8px rgba(255,107,0,.35);
        }

        /* ==========================================================================
           BOTÃO CADASTRAR
           ========================================================================== */

        button {
            margin-top: 30px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--naruto-orange);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
            box-shadow: 0 5px 12px rgba(0,0,0,.2);
        }

        button:hover {
            background: #e55f00;
            transform: translateY(-3px);
        }

        button:active {
            transform: scale(.97);
        }

        /* ==========================================================================
           LINK VOLTAR
           ========================================================================== */

        a {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: var(--konoha-blue);
            font-weight: bold;
            transition: .3s;
        }

        a:hover {
            color: var(--naruto-orange);
        }

        /* ==========================================================================
           RESPONSIVIDADE
           ========================================================================== */

        @media (max-width: 768px) {

            body {
                padding: 20px;
            }

            h1 {
                font-size: 2rem;
                text-align: center;
            }

            .form-container {
                padding: 25px;
            }

            button {
                width: 100%;
            }

        }
        /* ==========================================================================
   BOTÃO VOLTAR
   ========================================================================== */

.btn-voltar {
    display: inline-block;
    margin-top: 20px;
    padding: 14px 22px;
    background: var(--konoha-blue);
    color: #fff;
    text-decoration: none;
    border-radius: 10px;
    font-weight: 600;
    text-align: center;
    transition: all .3s ease;
    box-shadow: 0 5px 12px rgba(0,0,0,.2);
}

.btn-voltar:hover {
    background: #274d7d;
    transform: translateY(-3px);
    box-shadow: 0 8px 16px rgba(0,0,0,.25);
}

.btn-voltar:active {
    transform: scale(.97);
}

    </style>
</head>
<body>
<h1>Adicionar Novo Ninja</h1>
<div class="form-container">
    <div th:if="${mensagem}" class="mensagem" th:text="${mensagem}"></div>
    <form th:action="@{/ninjas/ui/salvar}" th:object="${ninja}" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nome}" required />

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required />

        <label for="imgUrl">URL da Imagem:</label>
        <input type="text" id="imgUrl" th:field="*{imgUrl}" required />

        <label for="idade">Idade:</label>
        <input type="number" id="idade" th:field="*{idade}" required />

        <label for="rank">Rank:</label>
        <input type="text" id="rank" th:field="*{rank}" />

        <button type="submit">Cadastrar Ninja</button>
    </form>
    <a th:href="@{/ninjas/ui/listar}" class="btn-voltar">Voltar para a lista de ninjas</a>
</div>

</body>
</html>
